type: map
mapping:
  tracking_locations:
    type: seq
    required: true
    sequence:
      - type: map
        mapping:
          id:
            type: str
            required: true
          platforms:
            type: seq
            sequence:
              - type: str
                enum: [ios, android]
          description:
            type: str

  tracking_events:
    type: seq
    required: true
    sequence:
      - type: map
        mapping:
          name:
            type: str
            required: true
          default_location:
            type: any
          description:
            type: str
          platforms:
            type: seq
            sequence:
              - type: str
                enum: [ios, android]
          parameters:
            type: seq
            sequence:
              - type: str
